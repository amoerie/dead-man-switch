name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Restore
        run: dotnet restore ./src/DeadManSwitch.sln

      - name: Build
        run: dotnet build ./src/DeadManSwitch.sln --no-restore --configuration Release

      - name: Test (net8.0 with coverage)
        run: dotnet test ./src/DeadManSwitch.sln --no-restore --no-build --configuration Release --framework net8.0 --collect:"XPlat Code Coverage" --settings ./src/coverlet.runsettings

      - name: Test (net9.0)
        run: dotnet test ./src/DeadManSwitch.sln --no-restore --no-build --configuration Release --framework net9.0

      - name: Test (net10.0)
        run: dotnet test ./src/DeadManSwitch.sln --no-restore --no-build --configuration Release --framework net10.0

      - uses: codecov/codecov-action@v6
